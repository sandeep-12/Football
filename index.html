<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Football 101 — Learn the Beautiful Game</title>
<meta name="description" content="A comprehensive interactive tutorial to learn football from scratch — rules, positions, tactics, history, and more.">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="header-content">
      <h1 class="logo">⚽ Football 101</h1>
      <div class="progress-wrap">
        <span class="progress-text" id="progress-text">0% complete</span>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
    </div>
  </header>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Chapters</h2>
      <button class="sidebar-close" id="sidebar-close">✕</button>
    </div>
    <ul class="nav-list" id="nav-list"></ul>
  </nav>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <main class="main-content" id="main-content">
    <div class="section-container" id="section-container"></div>
    <div class="nav-buttons">
      <button class="btn btn-outline" id="prev-btn" onclick="navigateSection(-1)">← Previous</button>
      <button class="btn btn-menu" id="menu-btn" onclick="toggleSidebar()">☰ Chapters</button>
      <button class="btn btn-primary" id="next-btn" onclick="navigateSection(1)">Next →</button>
    </div>
  </main>
</div>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
